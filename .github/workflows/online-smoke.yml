name: Online Smoke

on:
  workflow_dispatch:
    inputs:
      checks:
        description: Optional comma-separated online smoke checks. Leave empty to run the default parallel groups.
        required: false
        default: ""
      groups:
        description: Optional comma-separated online smoke group names. Used only when checks is empty.
        required: false
        default: ""
      model:
        description: Model passed to the smoke harness
        required: false
        default: claude-sonnet-4-6
      max_budget_usd:
        description: Per-check budget cap
        required: false
        default: "0.20"
      command_timeout_ms:
        description: Default timeout for single-command smoke checks
        required: false
        default: "120000"
      multi_step_timeout_ms:
        description: Timeout for multi-step tool and MCP smoke checks
        required: false
        default: "180000"

jobs:
  online-smoke-default:
    if: ${{ inputs.checks == '' && inputs.groups == '' }}
    name: Online Smoke (${{ matrix.group_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group_name: api-and-session
          - group_name: tools-and-agent
          - group_name: integrations
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check secrets
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::Set ANTHROPIC_API_KEY in repository secrets before running online smoke."
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run online smoke
        env:
          SMOKE_MODEL: ${{ inputs.model }}
          SMOKE_MAX_BUDGET_USD: ${{ inputs.max_budget_usd }}
          SMOKE_COMMAND_TIMEOUT_MS: ${{ inputs.command_timeout_ms }}
          SMOKE_MULTI_STEP_TOOL_TIMEOUT_MS: ${{ inputs.multi_step_timeout_ms }}
        run: bun run smoke -- --online --groups "${{ matrix.group_name }}"

  online-smoke-groups:
    if: ${{ inputs.checks == '' && inputs.groups != '' }}
    name: Online Smoke (groups)
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check secrets
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::Set ANTHROPIC_API_KEY in repository secrets before running online smoke."
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run online smoke
        env:
          SMOKE_MODEL: ${{ inputs.model }}
          SMOKE_MAX_BUDGET_USD: ${{ inputs.max_budget_usd }}
          SMOKE_COMMAND_TIMEOUT_MS: ${{ inputs.command_timeout_ms }}
          SMOKE_MULTI_STEP_TOOL_TIMEOUT_MS: ${{ inputs.multi_step_timeout_ms }}
        run: bun run smoke -- --online --groups "${{ inputs.groups }}"

  online-smoke-custom:
    if: ${{ inputs.checks != '' }}
    name: Online Smoke (custom)
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check secrets
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::Set ANTHROPIC_API_KEY in repository secrets before running online smoke."
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run online smoke
        env:
          SMOKE_MODEL: ${{ inputs.model }}
          SMOKE_MAX_BUDGET_USD: ${{ inputs.max_budget_usd }}
          SMOKE_COMMAND_TIMEOUT_MS: ${{ inputs.command_timeout_ms }}
          SMOKE_MULTI_STEP_TOOL_TIMEOUT_MS: ${{ inputs.multi_step_timeout_ms }}
        run: bun run smoke -- --online --checks "${{ inputs.checks }}"
